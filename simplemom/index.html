<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Lovio ❤️ For Mom</title>

  <style>
    body {
      margin: 0;
      font-family: Poppins, sans-serif;
      background: #ffe4ec;
      text-align: center;
      padding: 20px;
    }

    h1 { color: #1a1a1a; }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    textarea { resize: none; }

    button {
      background: #7b2cbf;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover { opacity: 0.9; }

    #app {
      margin-top: 30px;
    }

    img {
      width: 90%;
      max-width: 250px;
      border-radius: 12px;
      margin-top: 10px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<h1>Lovio ❤️ For Mom</h1>

<!-- CREATE -->
<div id="createBox" class="card">
  <input id="slug" placeholder="Slug (example: my-mom)" />
  <input id="name" placeholder="Your Name" />
  <textarea id="message" placeholder="Write message for mom"></textarea>
  <input id="image" placeholder="Image URL (optional)" />

  <button onclick="createPage()">Create Page</button>

  <p id="result"></p>

  <hr />
  <p>OR load from JSON file</p>
  <input type="file" id="jsonFile" accept=".json" />
</div>

<!-- VIEW -->
<div id="app"></div>

<script type="module" src="app.js"></script>
</body>
</html>
