<!DOCTYPE html>
<html>
<head>
  <title>Lovio Preview ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Poppins, sans-serif;
      background: #ffe4ec;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      max-width: 350px;
      width: 90%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 { color: #1a1a1a; }
    h2 { color: #444; }

    img {
      width: 100%;
      border-radius: 12px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div id="app" class="card">
  <h1>Loading ❤️...</h1>
</div>

<script>
/* 🔥 MOCK DATA */
const mockData = {
  "simplemom": {
    name: "Sanjay",
    message: "Mom, you are my strength and my heart ❤️",
    image: "https://via.placeholder.com/300"
  },

  "sanjay-mom": {
    name: "Sanjay",
    message: "Thank you for everything mom ❤️",
    image: "https://via.placeholder.com/300"
  }
};

/* ✅ ALWAYS USE QUERY PARAM */
const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

/* 🧠 RENDER */
const app = document.getElementById("app");

if (!slug || !mockData[slug]) {
  app.innerHTML = "<h1>Page Not Found ❌</h1>";
} else {
  const page = mockData[slug];

  app.innerHTML = `
    <h1>For Mom ❤️</h1>
    <h2>From ${page.name}</h2>
    <p>${page.message}</p>
    ${page.image ? `<img src="${page.image}" />` : ""}
  `;
}
</script>

</body>
</html>
